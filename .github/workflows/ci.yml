name: CI

on:
  push:
    branches:
      - develop
      - "feature/**"
  pull_request:

permissions:
  contents: read

jobs:
  edge-functions:
    name: Edge functions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Check formatting
        run: deno fmt --check supabase/functions

      - name: Lint functions
        run: deno lint supabase/functions

      - name: Type-check functions
        run: deno check supabase/functions/extract-invoice/index.ts supabase/functions/evaluate-risk/index.ts
